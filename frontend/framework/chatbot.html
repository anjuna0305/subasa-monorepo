<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-Like Chatbot</title>
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>
<div class="upload-container" id="upload-section">
    <h2>Upload Your Document</h2>
    <form id="upload-form">
        <input type="file" id="file-input" accept=".pdf, .txt">
        <button type="button" id="upload-btn" onclick="uploadFile()">Upload</button>
    </form>
</div>

<div id="chatbot-container" class="hidden">
    <div class="chat-container">
        <div class="chat-display" id="chat-display"></div>
        <div class="input-container">
            <input
                    type="text"
                    id="user-input"
                    placeholder="Ask me anything..."
                    onkeydown="if(event.key === 'Enter') sendMessage()"
            >
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<script src="chatbot.js"></script>
</body>
</html>
