server {
    listen 7005;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve static files with caching
    location ~* \.(css|js|ico|jpg|png|gif|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
