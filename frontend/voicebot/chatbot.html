<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ශ්‍රී ලංකා ආණ්ඩුක්‍රම ව්‍යවස්ථාවෙන් විමසන්න</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <img align="right" src="static\logo.png" alt="front-img" class="logo">
  </div>
    <img src="static\front-img.jpg" alt="front-img" class="front-img">
  <div id="chat-display" class="chat-display"></div>
  <div class="input-container">
      <input type="text" id="user-input" placeholder="ඔබේ ප්‍රශ්නය ටයිප් කරන්න" onkeydown="if(event.key === 'Enter') sendChatbotMessage()">
      <button id="microphone-button" class="voice-button" onclick="startVoiceInput(this)">🎙</button>
<!--?      <button id="microphone-button" class="voice-button" onclick="startVoiceInput(this)"><i class="fa-solid fa-microphone"></i></button>-->
      <button onclick="sendChatbotMessage()" class="send-button"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
