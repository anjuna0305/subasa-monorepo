<h1 class="center-heading">සැකසුම්</h1>

<div class="settings-form">
    <p>ඔබගේ අභිප්‍රේත සකසන්න</p>

    <form id="settings-form">
        <div class="voice-options">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">හඬ:</label>

            <div class="voice-option">
                <input type="radio" id="male-voice" name="voice" value="male">
                <label for="male-voice">👨 පිරිමි </label>
            </div>

            <div class="voice-option">
                <input type="radio" id="female-voice" name="voice" value="female">
                <label for="female-voice">👩 ගැහැණු </label>
            </div>
        </div>

        <button id="saveSettings" type="submit" style="
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        ">
            සැකසුම් සුරකින්න
        </button>
    </form>
</div>
